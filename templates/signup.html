<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chihuahuateca - Signup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="body-autenticacion">

    <div class="contenedor-auth">
        <div class="panel-presentacion">
            <div class="logo-circulo">
                <h1>🐾</h1>
            </div>
            <h2 class="titulo-auth-app">Chihuahuateca</h2>
            <p class="subtitulo-auth-app">El guardián ideal de libros y películas</p>
        </div>

        <div class="panel-formulario">
            <div class="formulario-contenido">
                <h3 class="saludo-auth">Crear Cuenta</h3>

                <form action="/api/signup" method="POST" id="form-signup">
                    <div class="grupo-input-auth">
                        <label for="name">Nombre:</label>
                        <input type="text" id="name" name="name" placeholder="Tu nombre" required>
                    </div>

                    <div class="grupo-input-auth">
                        <label for="username">Nombre de Usuario:</label>
                        <input type="text" id="username" name="username" placeholder="Tu nombre de usuario" required>
                    </div>

                    <div class="grupo-input-auth">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                    </div>

                    <div class="grupo-input-auth">
                        <label for="confirm_password">Confirmar Contraseña:</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirma tu contraseña" required>
                    </div>

                    <button type="submit" class="btn-auth-enviar">Crear cuenta 🐾</button>
                </form>

                <div class="auth-enlace-cambio">
                    <p>¿Ya tienes una cuenta?</p>
                    <a href="/">Inicia sesión aquí</a>
                </div>

                <footer class="auth-footer">
                    <p>Desarrollado por Andrey 🎴</p>
                </footer>
            </div>
        </div>
    </div>

</body>
</html>
