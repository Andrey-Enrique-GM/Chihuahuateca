<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chihuahuateca - Iniciar sesión</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/site/favicon.ico') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/site/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="body-autenticacion">

    <div class="contenedor-auth">
        <div class="panel-presentacion">
            <div class="logo-circulo">
                <h1>🐾</h1>
            </div>
            <h2 class="titulo-auth-app">Chihuahuateca</h2>
            <p class="subtitulo-auth-app">El guardián ideal de libros y películas</p>
        </div>



        <div class="panel-formulario">
            <div class="formulario-contenido">
                <h3 class="saludo-auth">Iniciar Sesión</h3>

                <form action="/api/login" method="POST" id="form-login">
                    <div class="grupo-input-auth">
                        <label for="username">Nombre de Usuario:</label>
                        <input type="text" id="username" name="username" required>
                    </div>

                    <div class="grupo-input-auth">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <button type="submit" class="btn-auth-enviar">Ingresar 🐾</button>
                </form>

                <div class="auth-enlace-cambio">
                    <p>¿No tienes una cuenta?</p>
                    <a href="/signup">Regístrate aquí</a>
                </div>

                <footer class="auth-footer">
                    <p>Desarrollado por Andrey 🎴</p>
                </footer>
            </div>
        </div>
    </div>


    
    <script>
    document.getElementById('form-login')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();

            if (result.success) {
                Swal.fire({
                    icon: 'success',
                    title: 'Bienvenido 🐾',
                    text: result.message || 'Inicio de sesión correcto.',
                    confirmButtonColor: '#2c3e50',
                    timer: 2000, // Se cierra solo en 2 segundos si no le dan clic
                    timerProgressBar: true
                }).then(() => {
                    window.location.href = result.redirect;
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Oops...',
                    text: result.message || 'Error al iniciar sesión',
                    confirmButtonColor: '#d35400'
                });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Conexión fallida', confirmButtonColor: '#d35400' });
        }
    });
    </script>

    <script src="{{ url_for('static', filename='libs/sweetalert2/sweetalert2.js') }} "></script>

</body>
</html>
