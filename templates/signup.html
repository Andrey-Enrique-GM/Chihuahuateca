<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chihuahuateca - Crear cuenta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="body-autenticacion">

    <div class="contenedor-auth">
        <div class="panel-presentacion">
            <div class="logo-circulo">
                <h1>🐾</h1>
            </div>
            <h2 class="titulo-auth-app">Chihuahuateca</h2>
            <p class="subtitulo-auth-app">El guardián ideal de libros y películas</p>
        </div>


        
        <div class="panel-formulario">
            <div class="formulario-contenido">
                <h3 class="saludo-auth">Crear Cuenta</h3>

                <form action="/api/signup" method="POST" id="form-signup">
                    <div class="grupo-input-auth">
                        <label for="name">Nombre:</label>
                        <input type="text" id="name" name="name" required>
                    </div>

                    <div class="grupo-input-auth">
                        <label for="username">Nombre de Usuario:</label>
                        <input type="text" id="username" name="username" required>
                    </div>

                    <div class="grupo-input-auth">
                        <label for="password">Contraseña:</label>
                        <input type="password" id="password" name="password" required>
                    </div>

                    <div class="grupo-input-auth">
                        <label for="confirm_password">Confirmar Contraseña:</label>
                        <input type="password" id="confirm_password" name="confirm_password" required>
                    </div>

                    <button type="submit" class="btn-auth-enviar">Crear cuenta 🐾</button>
                </form>

                <div class="auth-enlace-cambio">
                    <p>¿Ya tienes una cuenta?</p>
                    <a href="/">Inicia sesión aquí</a>
                </div>

                <footer class="auth-footer">
                    <p>Desarrollado por Andrey 🎴</p>
                </footer>
            </div>
        </div>
    </div>



    <script>
    document.getElementById('form-signup')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData.entries());

        try {
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();

            if (result.success) {
                Swal.fire({
                    icon: 'success',
                    title: '¡Buen trabajo! 🐾',
                    text: result.message,
                    confirmButtonColor: '#2c3e50'
                }).then(() => {
                    window.location.href = '/'; // Redirige al login tras cerrar la alerta
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Error de registro',
                    text: result.message || 'No se pudo crear la cuenta',
                    confirmButtonColor: '#d35400'
                });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Conexión fallida', confirmButtonColor: '#d35400' });
        }
    });
    </script>

    <script src="{{ url_for('static', filename='libs/sweetalert2/sweetalert2.js') }} "></script>

</body>
</html>
